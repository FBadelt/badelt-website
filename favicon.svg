<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    .bg-r   { fill: #243b53; stroke: #ffffff; }
    .bg-b   { fill: #486581; }
    @media (prefers-color-scheme: dark) {
      .bg-r { fill: #f7f9fb; stroke: #1b2b3a; }
      .bg-b { fill: #bcccdc; }
    }
  </style>
  <g font-family="Georgia, 'Times New Roman', serif" font-weight="400"
     font-size="78" text-anchor="middle" dominant-baseline="central">
    <text x="40" y="34" class="bg-b">B</text>
    <text x="24" y="34" class="bg-r"
          stroke-width="1.8" paint-order="stroke">R</text>
  </g>
</svg>
