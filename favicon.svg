<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    .bg-r    { fill: #243b53; stroke: #ffffff; }
    .bg-b    { fill: #486581; }
    .accent  { fill: #334e68; }
    @media (prefers-color-scheme: dark) {
      .bg-r   { fill: #f7f9fb; stroke: #1b2b3a; }
      .bg-b   { fill: #bcccdc; }
      .accent { fill: #bcccdc; }
    }
  </style>
  <g font-family="Georgia, 'Times New Roman', serif" font-weight="700"
     font-size="44" text-anchor="middle" dominant-baseline="central">
    <text x="39" y="30" class="bg-b">B</text>
    <text x="27" y="30" class="bg-r"
          stroke-width="1.8" paint-order="stroke">R</text>
  </g>
  <rect x="16" y="54" width="32" height="1.2" class="accent" opacity="0.55"/>
</svg>
